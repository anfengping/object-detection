name: Build Award Application Package

on:
  push:
    branches:
      - temp-award-build-20260716
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice fonts-noto-cjk fonts-noto-cjk-extra

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-docx lxml svgwrite cairosvg pillow

      - name: Build optimized Word and Visio package
        run: python build_award.py

      - name: Verify package
        run: |
          test -f output/Power_Line_UAV_Award_Optimized_Package.zip
          test -f output/Optimized_Power_Line_UAV_Award_Application.docx
          test "$(find output/Visio_Editable_Figures -name '*.vsdx' | wc -l)" -eq 15
          unzip -t output/Power_Line_UAV_Award_Optimized_Package.zip
          ls -lh output/

      - name: Upload generated package
        uses: actions/upload-artifact@v4
        with:
          name: Power-Line-UAV-Award-Optimized-Package
          path: |
            output/Power_Line_UAV_Award_Optimized_Package.zip
            output/Optimized_Power_Line_UAV_Award_Application.docx
            output/Optimized_Power_Line_UAV_Award_Application.pdf
          if-no-files-found: error
          retention-days: 3
